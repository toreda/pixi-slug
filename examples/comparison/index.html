<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pixi-slug — Live Rendering Comparison</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: #0a0a1a;
			font-family: sans-serif;
			color: #eee;
		}
		h1 {
			text-align: center;
			padding: 12px;
			font-size: 1.2rem;
			background: #16213e;
		}
		#controls {
			display: flex;
			gap: 12px;
			padding: 10px 20px;
			background: #1a1a2e;
			align-items: center;
			flex-wrap: wrap;
		}
		#controls button {
			padding: 6px 14px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			cursor: pointer;
			border-radius: 4px;
			font-size: 13px;
		}
		#controls button:hover { background: #3a3a6e; }
		#controls button.active { background: #4a6aae; border-color: #6a8ade; }
		#controls span { font-size: 13px; color: #aaa; }
		#controls label { font-size: 13px; color: #aaa; }
		#controls select {
			padding: 5px 8px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			cursor: pointer;
			border-radius: 4px;
			font-size: 13px;
		}
		#controls select:hover { background: #3a3a6e; }
		#speedSlider { width: 80px; accent-color: #4a6aae; cursor: pointer; }
		#speedNumber {
			width: 48px;
			padding: 4px 6px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			border-radius: 4px;
			font-size: 13px;
			text-align: center;
		}
		#status { font-size: 12px; color: #888; margin-left: auto; }
		canvas { display: block; }
		#nav {
			display: flex;
			gap: 0;
			background: #0d1117;
			width: 100%;
		}
		#nav a {
			padding: 8px 18px;
			color: #8b949e;
			text-decoration: none;
			font-size: 13px;
			font-family: sans-serif;
			border-bottom: 2px solid transparent;
		}
		#nav a:hover { color: #eee; background: #161b22; }
		#nav a.active { color: #eee; border-bottom-color: #4a6aae; }
	</style>
</head>
<body>
	<nav id="nav">
		<a href="/examples/v8/">V8</a>
		<a href="/examples/v7/">V7</a>
		<a href="/examples/v6/">V6</a>
		<a href="/examples/comparison/" class="active">Live Rendering Comparison</a>
		<a href="/examples/benchmark/">Benchmark</a>
	</nav>
	<h1>Live Rendering Comparison</h1>
	<div style="padding:8px 20px;background:#1a1a2e;border-bottom:1px solid #333">
		<label for="sampleTextInput" style="font-size:13px;color:#aaa;margin-right:8px">Text:</label>
		<input type="text" id="sampleTextInput" value="The quick brown fox"
			style="width:500px;padding:5px 8px;border:1px solid #444;background:#2a2a4e;color:#eee;border-radius:4px;font-size:14px">
	</div>
	<div id="controls">
		<button id="btnScale" class="active">Scale</button>
		<button id="btnMove">Move</button>
		<button id="btnRotate">Rotate</button>
		<button id="btnAll">All Combined</button>
		<button id="btnScroll">Scroll</button>
		<button id="btnPause">Pause</button>
		<span>|</span>
		<button id="btnReset">Reset</button>
		<span>|</span>
		<button id="btnSupersampling">Supersampling: Off</button>
		<label for="supersampleCount">Samples:</label>
		<select id="supersampleCount">
			<option value="2">2</option>
			<option value="4" selected>4</option>
			<option value="8">8</option>
			<option value="16">16</option>
		</select>
		<span>|</span>
		<label for="fpsLimit">FPS Limit:</label>
		<select id="fpsLimit">
			<option value="0">Unlimited</option>
			<option value="120">120</option>
			<option value="60" selected>60</option>
			<option value="30">30</option>
			<option value="15">15</option>
		</select>
		<span>|</span>
		<label for="speedSlider">Speed:</label>
		<input type="range" id="speedSlider" min="0.1" max="4" step="0.1" value="1">
		<input type="number" id="speedNumber" min="0.1" max="4" step="0.1" value="1">
		<span id="status">Loading...</span>
	</div>
	<div id="app"></div>

	<!-- PixiJS v8 via CDN -->
	<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>

	<!-- pixi-slug v8 bundle -->
	<script src="../../dist/v8/index.js"></script>

	<script>
		(async function () {
			// ----- App setup -----
			var app = new PIXI.Application();
			await app.init({
				width: 1200,
				height: 800,
				backgroundColor: 0x16213e,
				preferWebGLVersion: 2,
				antialias: true,
				resolution: 1,
			});
			document.getElementById('app').appendChild(app.canvas);

			var gl = app.renderer.gl;
			if (!gl || !(gl instanceof WebGL2RenderingContext)) {
				document.getElementById('status').textContent = 'WebGL2 required but not available.';
				return;
			}

			// ----- Load font -----
			var fontResponse = await fetch('font.ttf');
			if (!fontResponse.ok) {
				document.getElementById('status').textContent = 'Place font.ttf in examples/comparison/';
				return;
			}

			var fontData = await fontResponse.arrayBuffer();

			// Load font for pixi-slug
			var slugFont = new pixiSlug.SlugFont(4096);
			await slugFont.load(fontData);

			// Load font for BitmapFont — generate from the same TTF at a fixed size
			// PixiJS v8 BitmapFont.from() creates a bitmap font from a CSS font.
			// We need the font loaded as a CSS font first.
			var fontBlob = new Blob([fontData], { type: 'font/ttf' });
			var fontUrl = URL.createObjectURL(fontBlob);
			var fontFace = new FontFace('ComparisonFont', 'url(' + fontUrl + ')');
			await fontFace.load();
			document.fonts.add(fontFace);

			// Install BitmapFont at a specific size for bitmap text comparison
			PIXI.BitmapFont.install({
				name: 'ComparisonBitmap',
				style: {
					fontFamily: 'ComparisonFont',
					fontSize: 48,
					fill: '#ffffff',
				}
			});

			document.getElementById('status').textContent = 'Ready';

			// ----- Column layout -----
			var colWidth = 400;
			var colX = [0, 400, 800];
			var headerY = 10;
			var textStartY = 75;
			var sampleText = 'The quick brown fox';
			var sizes = [16, 24, 32, 48];

			// ----- Column headers (static) -----
			var headers = [
				{ label: 'pixi-slug (GPU Bezier)', x: colX[0] },
				{ label: 'PIXI.Text (Canvas 2D)', x: colX[1] },
				{ label: 'PIXI.BitmapText (Bitmap)', x: colX[2] },
			];

			var statStyle = { fill: '#668899', fontSize: 11, fontFamily: 'monospace' };
			var statLabels = [];

			for (var h of headers) {
				var hdr = new PIXI.Text({
					text: h.label,
					style: { fill: '#ffcc00', fontSize: 14, fontFamily: 'sans-serif' }
				});
				hdr.x = h.x + 10;
				hdr.y = headerY;
				app.stage.addChild(hdr);

				var stat = new PIXI.Text({ text: '', style: statStyle });
				stat.x = h.x + 10;
				stat.y = headerY + 18;
				app.stage.addChild(stat);
				statLabels.push(stat);
			}

			// Divider lines
			for (var i = 1; i < 3; i++) {
				var line = new PIXI.Graphics();
				line.rect(colX[i] - 1, 0, 2, 800);
				line.fill({ color: 0x333355 });
				app.stage.addChild(line);
			}

			// ----- Create text groups -----
			// Each group is a Container that holds multiple text sizes.
			// All three groups are animated together.

			var slugGroup = new PIXI.Container();
			var textGroup = new PIXI.Container();
			var bitmapGroup = new PIXI.Container();

			slugGroup.x = colX[0] + 10;
			slugGroup.y = textStartY;
			textGroup.x = colX[1] + 10;
			textGroup.y = textStartY;
			bitmapGroup.x = colX[2] + 10;
			bitmapGroup.y = textStartY;

			var slugTexts = [];
			var pixiTexts = [];
			var bitmapTexts = [];
			var yOffset = 0;
			for (var si = 0; si < sizes.length; si++) {
				var sz = sizes[si];

				// Size label
				var labelStyle = { fill: '#888888', fontSize: 11, fontFamily: 'sans-serif' };

				var slugLabel = new PIXI.Text({ text: sz + 'px', style: labelStyle });
				slugLabel.y = yOffset;
				slugGroup.addChild(slugLabel);

				var textLabel = new PIXI.Text({ text: sz + 'px', style: labelStyle });
				textLabel.y = yOffset;
				textGroup.addChild(textLabel);

				var bitmapLabel = new PIXI.Text({ text: sz + 'px', style: labelStyle });
				bitmapLabel.y = yOffset;
				bitmapGroup.addChild(bitmapLabel);

				yOffset += 16;

				// pixi-slug text
				var slugText = new pixiSlug.SlugText({text: sampleText, slugFont: slugFont, options: {fontSize: sz}});
				slugText.y = yOffset;
				slugGroup.addChild(slugText);
				slugTexts.push(slugText);

				// PIXI.Text (Canvas 2D rendered)
				var pixiText = new PIXI.Text({
					text: sampleText,
					style: {
						fontFamily: 'ComparisonFont',
						fontSize: sz,
						fill: '#ffffff',
					}
				});
				pixiText.y = yOffset;
				textGroup.addChild(pixiText);
				pixiTexts.push(pixiText);

				// BitmapText
				var bmpText = new PIXI.BitmapText({
					text: sampleText,
					style: {
						fontFamily: 'ComparisonBitmap',
						fontSize: sz,
					}
				});
				bmpText.y = yOffset;
				bitmapGroup.addChild(bmpText);
				bitmapTexts.push(bmpText);

				yOffset += sz * 1.8 + 20;
			}

			app.stage.addChild(slugGroup);
			app.stage.addChild(textGroup);
			app.stage.addChild(bitmapGroup);

			// ----- Text input binding -----
			document.getElementById('sampleTextInput').oninput = function () {
				var val = this.value;
				for (var i = 0; i < slugTexts.length; i++) {
					slugTexts[i].text = val;
				}
				for (var i = 0; i < pixiTexts.length; i++) {
					pixiTexts[i].text = val;
				}
				for (var i = 0; i < bitmapTexts.length; i++) {
					bitmapTexts[i].text = val;
				}
			};

			// ----- Memory + rebuild stats -----
			function formatBytes(bytes) {
				if (bytes >= 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
				if (bytes >= 1024) return (bytes / 1024).toFixed(1) + ' KB';
				return bytes + ' B';
			}

			function updateStatus() {
				// --- pixi-slug: exact GPU breakdown ---
				var fontMem = slugFont.memoryBytes();
				var meshMem = 0;
				var totalRebuilds = 0;
				for (var i = 0; i < slugTexts.length; i++) {
					meshMem += slugTexts[i].meshMemoryBytes();
					totalRebuilds += slugTexts[i].rebuildCount;
				}
				statLabels[0].text =
					'GPU: ' + formatBytes(fontMem + meshMem) +
					'  (font ' + formatBytes(fontMem) +
					' + mesh ' + formatBytes(meshMem) + ')' +
					'  rebuilds: ' + totalRebuilds;

				// GPU details for PIXI.Text and BitmapText are omitted —
				// only pixi-slug reports accurate GPU memory via its own API.
				// PixiJS does not expose reliable per-object GPU memory figures
				// for canvas-backed Text or BitmapFont atlas textures.
				statLabels[1].text = '';
				statLabels[2].text = '';

				document.getElementById('status').textContent = 'Ready';
			}
			updateStatus();


			// ----- Animation state -----
			var mode = 'scale';  // 'scale', 'move', 'rotate', 'all', 'scroll'
			var paused = false;
			var speed = 1.0;  // multiplier applied to dtSec each frame

			document.getElementById('speedSlider').oninput = function () {
				speed = parseFloat(this.value);
				document.getElementById('speedNumber').value = this.value;
			};
			document.getElementById('speedNumber').oninput = function () {
				var v = Math.min(4, Math.max(0.1, parseFloat(this.value) || 1));
				speed = v;
				document.getElementById('speedSlider').value = v;
			};
			// elapsedSec accumulates real wall-clock seconds via deltaMS so
			// animation speed is frame-rate independent.
			var elapsedSec = 0;

			// Target durations (seconds) for one full scale/move/rotate cycle.
			var SCALE_PERIOD  = 4.0;   // seconds for min→max→min
			var MOVE_PERIOD_Y = 3.0;
			var MOVE_PERIOD_X = 5.0;
			var ROTATE_PERIOD = 6.0;

			// Scroll state — one Y position per group, driven by dt.
			var SCROLL_SPEED = 80;  // pixels per second
			var CANVAS_H = 800;
			// Safety margin: wait until this far past canvas bottom before wrapping.
			var SCROLL_BOTTOM_MARGIN = CANVAS_H * 0.05;
			// Gap above canvas top that text starts from on wrap (so the jump isn't visible).
			var SCROLL_TOP_GAP = CANVAS_H * 0.05;

			// Measure the natural height of each group's content (set once after layout).
			var groupContentHeight = yOffset;  // yOffset accumulated during text creation

			// Per-group scroll Y (world-space top of the group container).
			var scrollY = [textStartY, textStartY, textStartY];

			// Current scroll velocity in px/sec, lerped toward the target each frame.
			var scrollVelocity = 0;
			// How quickly velocity catches up to the target (higher = snappier).
			var SCROLL_LERP_RATE = 4.0;

			// ----- Group reset -----
			// Restores every group to its default transform and resets all
			// animation state. Called on every mode change before mode-specific
			// setup so no stale values carry over.
			function resetGroups() {
				var groups = [slugGroup, textGroup, bitmapGroup];
				for (var gi = 0; gi < groups.length; gi++) {
					var g = groups[gi];
					g.x = colX[gi] + 10;
					g.y = textStartY;
					g.scale.set(1, 1);
					g.rotation = 0;
					g.pivot.set(0, 0);
				}
				// Reset oscillation clock.
				elapsedSec = 0;
				// Reset scroll positions to the natural start.
				for (var i = 0; i < 3; i++) scrollY[i] = textStartY;
				scrollVelocity = 0;
			}

			// Button handlers
			var buttons = {
				scale: document.getElementById('btnScale'),
				move: document.getElementById('btnMove'),
				rotate: document.getElementById('btnRotate'),
				all: document.getElementById('btnAll'),
				scroll: document.getElementById('btnScroll'),
			};

			function setMode(m) {
				mode = m;
				for (var k in buttons) {
					buttons[k].classList.toggle('active', k === m);
				}
				// Always reset everything to defaults first, then apply
				// any mode-specific initial state below.
				resetGroups();
				// (No mode-specific setup required currently — scroll state
				// is already initialised by resetGroups, and oscillation
				// modes derive all values from elapsedSec each frame.)
			}

			buttons.scale.onclick  = function () { setMode('scale'); };
			buttons.move.onclick   = function () { setMode('move'); };
			buttons.rotate.onclick = function () { setMode('rotate'); };
			buttons.all.onclick    = function () { setMode('all'); };
			buttons.scroll.onclick = function () { setMode('scroll'); };

			document.getElementById('btnPause').onclick = function () {
				paused = !paused;
				this.textContent = paused ? 'Resume' : 'Pause';
				this.classList.toggle('active', paused);
			};

			var supersampling = false;
			document.getElementById('btnSupersampling').onclick = function () {
				supersampling = !supersampling;
				for (var i = 0; i < slugTexts.length; i++) {
					slugTexts[i].supersampling = supersampling;
				}
				this.textContent = 'Supersampling: ' + (supersampling ? 'On' : 'Off');
				this.classList.toggle('active', supersampling);
			};

			document.getElementById('supersampleCount').onchange = function () {
				var count = parseInt(this.value, 10);
				for (var i = 0; i < slugTexts.length; i++) {
					slugTexts[i].supersampleCount = count;
				}
			};

			document.getElementById('fpsLimit').onchange = function () {
				app.ticker.maxFPS = parseInt(this.value, 10);
			};
			app.ticker.maxFPS = 60;

			document.getElementById('btnReset').onclick = function () {
				resetGroups();
				applyTransform(0);
			};

			// ----- Animation loop -----
			// t is wall-clock seconds. Each oscillation uses its own period so
			// the speed is the same regardless of frame rate.
			function applyTransform(t) {
				var groups = [slugGroup, textGroup, bitmapGroup];

				var doScale  = (mode === 'scale'  || mode === 'all');
				var doMove   = (mode === 'move'   || mode === 'all');
				var doRotate = (mode === 'rotate' || mode === 'all');

				// Pre-compute time-based values shared across all three columns.
				var scaleVal  = doScale  ? 1.0 + 0.7 * Math.sin((t / SCALE_PERIOD)  * Math.PI * 2) : 1;
				var moveY     = doMove   ? 80  * Math.sin((t / MOVE_PERIOD_Y) * Math.PI * 2) : 0;
				var moveX     = doMove   ? 30  * Math.sin((t / MOVE_PERIOD_X) * Math.PI * 2) : 0;
				var rotAngle  = doRotate ? 0.26 * Math.sin((t / ROTATE_PERIOD) * Math.PI * 2) : 0;

				for (var gi = 0; gi < groups.length; gi++) {
					var g = groups[gi];
					var baseX = colX[gi] + 10;
					var baseY = textStartY;

					// Reset
					g.x = baseX;
					g.y = baseY;
					g.scale.set(1, 1);
					g.rotation = 0;
					g.pivot.set(0, 0);

					if (doScale) {
						g.scale.set(scaleVal, scaleVal);
						// Scale from center of column
						g.pivot.set((colWidth - 20) / 2, 300);
						g.x = baseX + (colWidth - 20) / 2;
						g.y = baseY + 300;
					}

					if (doMove) {
						g.y += moveY;
						g.x += moveX;
					}

					if (doRotate) {
						g.rotation = rotAngle;
						if (!doScale) {
							// Set pivot for rotation if not already set by scale
							g.pivot.set((colWidth - 20) / 2, 300);
							g.x = baseX + (colWidth - 20) / 2;
							g.y = baseY + 300;
						}
					}
				}
			}

			// ----- Scroll update -----
			function updateScroll(dtSec) {
				var groups = [slugGroup, textGroup, bitmapGroup];

				// Lerp velocity toward target speed — frame-rate independent exponential ease.
				var targetVelocity = SCROLL_SPEED * speed;
				scrollVelocity += (targetVelocity - scrollVelocity) * Math.min(SCROLL_LERP_RATE * dtSec, 1.0);

				var dy = scrollVelocity * dtSec;

				for (var gi = 0; gi < groups.length; gi++) {
					scrollY[gi] += dy;

					// The bottom edge of the content in world space.
					var bottomEdge = scrollY[gi] + groupContentHeight;

					// Once the entire bounding box has cleared the canvas bottom
					// (plus safety margin), wrap back above the top.
					if (bottomEdge > CANVAS_H + SCROLL_BOTTOM_MARGIN) {
						// Place the top of the group above the canvas by the content
						// height plus a gap, so the wrap is never visible.
						scrollY[gi] = -(groupContentHeight + SCROLL_TOP_GAP);
					}

					// Apply — no rotation/scale in scroll mode.
					var g = groups[gi];
					g.x = colX[gi] + 10;
					g.y = scrollY[gi];
					g.scale.set(1, 1);
					g.rotation = 0;
					g.pivot.set(0, 0);
				}
			}

			// ----- FPS counter -----
			var fpsText = new PIXI.Text({
				text: 'FPS: --',
				style: { fill: '#00ff88', fontSize: 14, fontFamily: 'monospace' }
			});
			fpsText.x = 1200 - 90;
			fpsText.y = 6;
			app.stage.addChild(fpsText);

			var fpsFrames = 0;
			var fpsTime = 0;

			app.ticker.add(function (ticker) {
				var dtSec = (ticker.deltaMS / 1000) * speed;
				if (!paused) {
					if (mode === 'scroll') {
						updateScroll(dtSec);
					} else {
						elapsedSec += dtSec;
						applyTransform(elapsedSec);
					}
				}

				fpsFrames++;
				fpsTime += ticker.deltaMS;
				if (fpsTime >= 500) {
					fpsText.text = 'FPS: ' + Math.round(fpsFrames / (fpsTime / 1000));
					fpsFrames = 0;
					fpsTime = 0;
				}
			});
		})();
	</script>
</body>
</html>
