<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pixi-slug — PixiJS v7 Example</title>
	<link rel="stylesheet" href="../_shared/sidebar.css">
</head>
<body>
	<nav id="nav">
		<a href="/examples/v8/">V8</a>
		<a href="/examples/v7/" class="active">V7</a>
		<a href="/examples/v6/">V6</a>
		<a href="/examples/comparison/">Live Rendering Comparison</a>
		<a href="/examples/benchmark/">Benchmark</a>
	</nav>
	<h1>pixi-slug — PixiJS v7</h1>

	<div id="main">
		<div id="sidebar"></div>
		<div id="app"></div>
	</div>

	<!-- PixiJS v7 via CDN -->
	<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>

	<!-- pixi-slug v7 bundle (build with: pnpm run build:v7) -->
	<script src="../../dist/v7/index.js"></script>

	<!-- Shared sidebar wiring -->
	<script src="../_shared/wire.js"></script>

	<script>
		(async function () {
			var appContainer = document.getElementById('app');
			var app = new PIXI.Application({
				resizeTo: appContainer,
				backgroundColor: 0x16213e,
				preferWebGLVersion: 2,
				antialias: true,
				resolution: 1
			});
			window.__PIXI_APP__ = app;

			appContainer.appendChild(app.view);

			// PIXI's `resizeTo` only listens for window resize events, so any
			// post-init layout shift (sidebar markup injecting, font load,
			// flex re-measure) leaves the canvas backing buffer out of sync
			// with its CSS display size — the browser then non-uniformly
			// stretches the rendered output. Observe the container directly
			// so we re-measure on every layout change.
			if (typeof ResizeObserver !== 'undefined') {
				new ResizeObserver(function () { app.resize(); }).observe(appContainer);
			}

			window.SlugExample.run({
				construct: function (cfg) {
					var slugText = new pixiSlug.SlugText({
						text: cfg.text,
						font: cfg.font,
						fallbackWhileLoading: false,
						options: cfg.options,
						errorPolicy: {unknownInput: 'throw', loadFailed: 'throw', unsupportedFormat: 'throw'}
					});
					slugText.position.set(10, 10);
					return slugText;
				},
				addToStage: function (slugText) { app.stage.addChild(slugText); },
				removeFromStage: function (slugText) { app.stage.removeChild(slugText); }
			});
		})();
	</script>
</body>
</html>
