<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pixi-slug — PixiJS v7 Example</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: #0a0a1a;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color: #eee;
			display: flex;
			flex-direction: column;
			min-height: 100vh;
		}
		h1 {
			text-align: center;
			padding: 12px;
			font-size: 1.2rem;
			background: #16213e;
			width: 100%;
		}
		canvas { border: none; }
		#nav {
			display: flex;
			gap: 0;
			background: #0d1117;
			width: 100%;
		}
		#nav a {
			padding: 8px 18px;
			color: #8b949e;
			text-decoration: none;
			font-size: 13px;
			border-bottom: 2px solid transparent;
		}
		#nav a:hover { color: #eee; background: #161b22; }
		#nav a.active { color: #eee; border-bottom-color: #4a6aae; }
		#main {
			display: flex;
			flex: 1;
		}
		#sidebar {
			width: 220px;
			min-width: 220px;
			padding: 14px 12px;
			background: #1a1a2e;
			font-size: 13px;
			color: #aaa;
			overflow-y: auto;
		}
		#sidebar .ctrl-group {
			margin-bottom: 14px;
		}
		#sidebar .ctrl-group-title {
			font-size: 11px;
			text-transform: uppercase;
			letter-spacing: 0.06em;
			color: #667;
			margin-bottom: 6px;
			padding-bottom: 4px;
			border-bottom: 1px solid #333;
		}
		#sidebar .ctrl-row {
			display: flex;
			align-items: center;
			gap: 6px;
			margin-bottom: 6px;
		}
		#sidebar .ctrl-row label {
			white-space: nowrap;
			min-width: 50px;
		}
		#sidebar input[type="text"],
		#sidebar textarea {
			width: 100%;
			padding: 4px 8px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			border-radius: 4px;
			font-size: 13px;
		}
		#sidebar textarea {
			resize: vertical;
			min-height: 48px;
			font-family: inherit;
		}
		#sidebar input[type="number"] {
			width: 56px;
			padding: 4px 6px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			border-radius: 4px;
			font-size: 13px;
			text-align: center;
		}
		#sidebar input[type="color"] {
			width: 28px; height: 24px;
			border: 1px solid #444;
			background: none;
			cursor: pointer;
			padding: 0;
		}
		#sidebar input[type="range"] {
			width: 80px;
			accent-color: #4a6aae;
			cursor: pointer;
		}
		#sidebar input[type="checkbox"] {
			accent-color: #4a6aae;
			cursor: pointer;
		}
		#sidebar .slider-val {
			width: 46px;
			padding: 2px 4px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			border-radius: 4px;
			font-size: 12px;
			text-align: center;
			appearance: textfield;
			-moz-appearance: textfield;
		}
		#sidebar .slider-val::-webkit-inner-spin-button,
		#sidebar .slider-val::-webkit-outer-spin-button {
			-webkit-appearance: none;
			margin: 0;
		}
		#sidebar select {
			padding: 3px 6px;
			border: 1px solid #444;
			background: #2a2a4e;
			color: #eee;
			border-radius: 4px;
			font-size: 13px;
			cursor: pointer;
		}
		#app {
			flex: 1;
			overflow: hidden;
		}
		#app canvas {
			display: block;
			width: 100% !important;
			height: 100% !important;
		}
	</style>
</head>
<body>
	<nav id="nav">
		<a href="/examples/v8/">V8</a>
		<a href="/examples/v7/" class="active">V7</a>
		<a href="/examples/v6/">V6</a>
		<a href="/examples/comparison/">Live Rendering Comparison</a>
		<a href="/examples/benchmark/">Benchmark</a>
	</nav>
	<h1>pixi-slug — PixiJS v7</h1>

	<div id="main">
		<div id="sidebar">
			<div class="ctrl-group">
				<div class="ctrl-group-title">Font</div>
				<div class="ctrl-row">
					<select id="ctrlFont" style="width: 100%;"></select>
				</div>
				<div class="ctrl-row">
					<span id="ctrlFontStatus" style="font-size: 12px; color: #8b949e;"></span>
				</div>
			</div>

			<div class="ctrl-group">
				<div class="ctrl-group-title">Text</div>
				<div class="ctrl-row">
					<textarea id="ctrlText" rows="2">The quick brown fox</textarea>
				</div>
				<div class="ctrl-row">
					<label for="ctrlFontSize">Size</label>
					<input type="range" id="ctrlFontSize" value="120" min="4" max="400" step="1">
					<input type="number" id="ctrlFontSizeVal" class="slider-val" value="120">
				</div>
				<div class="ctrl-row">
					<label for="ctrlFillColor">Fill</label>
					<input type="color" id="ctrlFillColor" value="#ffffff">
				</div>
				<div class="ctrl-row">
					<input type="checkbox" id="ctrlWordWrap">
					<label for="ctrlWordWrap">Word Wrap</label>
					<input type="checkbox" id="ctrlBreakWords">
					<label for="ctrlBreakWords">Break</label>
				</div>
				<div class="ctrl-row">
					<label for="ctrlWrapWidth">Width</label>
					<input type="range" id="ctrlWrapWidth" value="400" min="50" max="2000" step="10">
					<input type="number" id="ctrlWrapWidthVal" class="slider-val" value="400">
				</div>
			</div>

			<div class="ctrl-group">
				<div class="ctrl-group-title">
					<input type="checkbox" id="ctrlStroke">
					<label for="ctrlStroke">Stroke</label>
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeWidth">Width</label>
					<input type="range" id="ctrlStrokeWidth" value="2" min="0" max="20" step="1">
					<input type="number" id="ctrlStrokeWidthVal" class="slider-val" value="2">
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeColor">Color</label>
					<input type="color" id="ctrlStrokeColor" value="#000000">
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeAlphaMode">Alpha</label>
					<select id="ctrlStrokeAlphaMode">
						<option value="uniform" selected>Uniform</option>
						<option value="gradient">Gradient</option>
					</select>
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeAlphaStart">Start</label>
					<input type="range" id="ctrlStrokeAlphaStart" value="1" min="0" max="1" step="0.05">
					<input type="number" id="ctrlStrokeAlphaStartVal" class="slider-val" value="1" step="0.05">
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeAlphaRate">Rate</label>
					<input type="range" id="ctrlStrokeAlphaRate" value="0" min="-0.5" max="0.5" step="0.01">
					<input type="number" id="ctrlStrokeAlphaRateVal" class="slider-val" value="0" step="0.01">
				</div>
			</div>

			<div class="ctrl-group">
				<div class="ctrl-group-title">
					<input type="checkbox" id="ctrlShadow">
					<label for="ctrlShadow">Shadow</label>
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowDist">Dist</label>
					<input type="range" id="ctrlShadowDist" value="5" min="0" max="30" step="1">
					<input type="number" id="ctrlShadowDistVal" class="slider-val" value="5">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowAngle">Angle</label>
					<input type="range" id="ctrlShadowAngle" min="0" max="360" step="1" value="30">
					<input type="number" id="ctrlShadowAngleVal" class="slider-val" value="30">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowAlpha">Alpha</label>
					<input type="range" id="ctrlShadowAlpha" min="0" max="1" step="0.05" value="1">
					<input type="number" id="ctrlShadowAlphaVal" class="slider-val" value="1" step="0.05">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowBlur">Blur</label>
					<input type="range" id="ctrlShadowBlur" min="0" max="20" step="1" value="0">
					<input type="number" id="ctrlShadowBlurVal" class="slider-val" value="0">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowColor">Color</label>
					<input type="color" id="ctrlShadowColor" value="#000000">
				</div>
			</div>
		</div>

		<div id="app"></div>
	</div>

	<!-- PixiJS v7 via CDN -->
	<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>

	<!-- pixi-slug v7 bundle (build with: pnpm run build:v7) -->
	<script src="../../dist/v7/index.js"></script>

	<script>
		(async function () {
			var appContainer = document.getElementById('app');
			var app = new PIXI.Application({
				resizeTo: appContainer,
				backgroundColor: 0x16213e,
				preferWebGLVersion: 2,
				antialias: true,
				resolution: 1
			});
			window.__PIXI_APP__ = app;

			appContainer.appendChild(app.view);

			var FONTS = {
				'Roboto TTF (default)':  'font.ttf',
				'Roboto TTF (fallback)': '/assets/fonts/roboto-fallback.ttf',
				'Roboto OTF (CFF)':      '/assets/fonts/roboto-fallback.otf',
				'Roboto WOFF':           '/assets/fonts/roboto-fallback.woff',
				'Roboto WOFF2':          '/assets/fonts/roboto-fallback.woff2'
			};

			var fontSelect = document.getElementById('ctrlFont');
			Object.keys(FONTS).forEach(function (label) {
				var opt = document.createElement('option');
				opt.value = FONTS[label];
				opt.textContent = label;
				fontSelect.appendChild(opt);
			});

			var fontStatus = document.getElementById('ctrlFontStatus');
			var slugText = null;

			async function loadFont(url) {
				fontStatus.style.color = '#8b949e';
				fontStatus.textContent = 'Loading ' + url + '...';
				try {
					if (slugText) {
						app.stage.removeChild(slugText);
						slugText.destroy();
						slugText = null;
					}
					slugText = new pixiSlug.SlugText({
						text: document.getElementById('ctrlText').value,
						font: url,
						fallbackWhileLoading: false,
						options: {
							fontSize: parseInt(document.getElementById('ctrlFontSize').value, 10) || 48,
							fill: hexToRGBA(document.getElementById('ctrlFillColor').value)
						},
						errorPolicy: {unknownInput: 'throw', loadFailed: 'throw', unsupportedFormat: 'throw'}
					});
					slugText.position.set(10, 10);
					app.stage.addChild(slugText);

					applyStroke();
					applyShadow();
					applyWordWrap();

					fontStatus.style.color = '#4ab07a';
					fontStatus.textContent = 'Loaded ' + url;
				} catch (e) {
					fontStatus.style.color = '#ff6b6b';
					fontStatus.textContent = 'Failed: ' + e.message;
					console.error('Font load failed for ' + url, e);
				}
			}

			fontSelect.onchange = function () { loadFont(this.value); };
			await loadFont(fontSelect.value);

			// --- Helpers ---
			function hexToRGBA(hex) {
				var r = parseInt(hex.slice(1, 3), 16) / 255;
				var g = parseInt(hex.slice(3, 5), 16) / 255;
				var b = parseInt(hex.slice(5, 7), 16) / 255;
				return [r, g, b, 1];
			}

			function applyStroke() {
				var enabled = document.getElementById('ctrlStroke').checked;
				if (!enabled) {
					slugText.strokeWidth = 0;
					return;
				}
				var w = parseFloat(document.getElementById('ctrlStrokeWidth').value) || 0;
				var c = hexToRGBA(document.getElementById('ctrlStrokeColor').value);
				var mode = document.getElementById('ctrlStrokeAlphaMode').value;
				var alphaStart = parseFloat(document.getElementById('ctrlStrokeAlphaStart').value);
				var alphaRate = parseFloat(document.getElementById('ctrlStrokeAlphaRate').value);
				slugText.stroke = {
					width: w,
					color: c,
					alphaMode: mode,
					alphaStart: alphaStart,
					alphaRate: alphaRate
				};
			}

			function applyShadow() {
				var enabled = document.getElementById('ctrlShadow').checked;
				if (!enabled) {
					slugText.dropShadow = null;
					return;
				}
				var dist = parseFloat(document.getElementById('ctrlShadowDist').value) || 5;
				var angleDeg = parseFloat(document.getElementById('ctrlShadowAngle').value) || 30;
				var alpha = parseFloat(document.getElementById('ctrlShadowAlpha').value);
				var blur = parseFloat(document.getElementById('ctrlShadowBlur').value) || 0;
				var c = hexToRGBA(document.getElementById('ctrlShadowColor').value);
				slugText.dropShadow = {
					distance: dist,
					angle: angleDeg * Math.PI / 180,
					color: c,
					alpha: alpha,
					blur: blur
				};
			}

			// --- Slider ↔ text input sync with clamping ---
			function linkSlider(sliderId, inputId, onChange) {
				var slider = document.getElementById(sliderId);
				var input = document.getElementById(inputId);
				var min = parseFloat(slider.min);
				var max = parseFloat(slider.max);
				var step = parseFloat(slider.step) || 1;

				function clampAndSync(source, target) {
					var v = parseFloat(source.value);
					if (isNaN(v)) return;
					v = Math.min(Math.max(v, min), max);
					v = Math.round(v / step) * step;
					v = parseFloat(v.toFixed(10));
					slider.value = v;
					input.value = v;
					if (onChange) onChange(v);
				}

				slider.oninput = function () { clampAndSync(slider, input); };
				input.onchange = function () { clampAndSync(input, slider); };
			}

			// --- Wire up controls ---
			document.getElementById('ctrlText').oninput = function () {
				slugText.text = this.value;
			};

			linkSlider('ctrlFontSize', 'ctrlFontSizeVal', function (v) {
				slugText.fontSize = v;
			});

			// Debounce rapid rebuilds from color pickers
			var _rebuildTimer = null;
			function debouncedApplyStroke() {
				clearTimeout(_rebuildTimer);
				_rebuildTimer = setTimeout(applyStroke, 30);
			}
			function debouncedApplyShadow() {
				clearTimeout(_rebuildTimer);
				_rebuildTimer = setTimeout(applyShadow, 30);
			}

			document.getElementById('ctrlFillColor').oninput = function () {
				slugText.color = hexToRGBA(document.getElementById('ctrlFillColor').value);
			};

			function applyWordWrap() {
				slugText.wordWrap = document.getElementById('ctrlWordWrap').checked;
				slugText.wordWrapWidth = parseFloat(document.getElementById('ctrlWrapWidth').value) || 400;
				slugText.breakWords = document.getElementById('ctrlBreakWords').checked;
			}
			document.getElementById('ctrlWordWrap').onchange = applyWordWrap;
			document.getElementById('ctrlBreakWords').onchange = applyWordWrap;
			linkSlider('ctrlWrapWidth', 'ctrlWrapWidthVal', applyWordWrap);

			document.getElementById('ctrlStroke').onchange = applyStroke;
			linkSlider('ctrlStrokeWidth', 'ctrlStrokeWidthVal', applyStroke);
			document.getElementById('ctrlStrokeColor').oninput = debouncedApplyStroke;
			document.getElementById('ctrlStrokeAlphaMode').onchange = applyStroke;
			linkSlider('ctrlStrokeAlphaStart', 'ctrlStrokeAlphaStartVal', applyStroke);
			linkSlider('ctrlStrokeAlphaRate', 'ctrlStrokeAlphaRateVal', applyStroke);

			document.getElementById('ctrlShadow').onchange = applyShadow;
			linkSlider('ctrlShadowDist', 'ctrlShadowDistVal', applyShadow);
			linkSlider('ctrlShadowAngle', 'ctrlShadowAngleVal', function () {
				debouncedApplyShadow();
			});
			linkSlider('ctrlShadowAlpha', 'ctrlShadowAlphaVal', applyShadow);
			linkSlider('ctrlShadowBlur', 'ctrlShadowBlurVal', applyShadow);
			document.getElementById('ctrlShadowColor').oninput = debouncedApplyShadow;
		})();
	</script>
</body>
</html>
