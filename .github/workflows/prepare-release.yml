name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (no leading "v"), e.g. 0.3.0. Bump package.json first.'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Promote CHANGELOG and open PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version input
        run: |
          VERSION='${{ github.event.inputs.version }}'
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$'; then
            echo "::error::version '${VERSION}' is not a valid semver"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run prepare script
        # Same as `pnpm release:prepare <version>` locally.
        # Repo URL is derived from $GITHUB_REPOSITORY inside the script.
        # Warnings (package.json mismatch, non-monotonic version) surface
        # via ::warning:: annotations; the PR description repeats them so
        # a reviewer notices before merging. Capture stderr to prepare.log
        # for the PR body — the script writes nothing to stdout on success.
        run: pnpm --silent release:prepare '${{ github.event.inputs.version }}' 2> prepare.log

      - name: Show prepare output
        run: cat prepare.log

      - name: Detect if anything changed
        id: diff
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — nothing to do
        if: steps.diff.outputs.changed == 'false'
        run: echo "::notice::CHANGELOG.md already prepared for ${{ github.event.inputs.version }} — no PR needed."

      - name: Capture prepare log for PR body
        if: steps.diff.outputs.changed == 'true'
        id: log
        run: |
          {
            echo 'log<<PREPARE_LOG_EOF'
            cat prepare.log
            echo 'PREPARE_LOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/prepare-release-${{ github.event.inputs.version }}
          base: ${{ github.ref_name }}
          commit-message: |
            chore: prepare CHANGELOG for v${{ github.event.inputs.version }}
          title: 'chore: prepare CHANGELOG for v${{ github.event.inputs.version }}'
          body: |
            Promotes the `[Unreleased]` heading to `[${{ github.event.inputs.version }}] - <today UTC>` and updates the reference-link block at the bottom of `CHANGELOG.md`. **No release notes were modified.**

            Generated by `.github/workflows/prepare-release.yml` calling `scripts/prepare-changelog-release.mjs`.

            ### Script output
            ```
            ${{ steps.log.outputs.log }}
            ```

            ### Next steps
            - Review the diff (only the heading line and the link block should change).
            - Merge this PR.
            - Tag and push: `git tag v${{ github.event.inputs.version }} && git push --follow-tags`.
            - The `release.yml` workflow will build, package, and publish the GitHub Release.
          delete-branch: true
          add-paths: |
            CHANGELOG.md
