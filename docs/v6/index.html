<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pixi-slug — PixiJS v6 Example</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: #0a0a1a;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color: #eee;
			display: flex;
			flex-direction: column;
			min-height: 100vh;
		}
		h1 {
			text-align: center;
			padding: 12px;
			font-size: 1.2rem;
			background: #16213e;
			width: 100%;
		}
		canvas { border: none; }
		#nav {
			display: flex;
			gap: 0;
			background: #0d1117;
			width: 100%;
		}
		#nav a {
			padding: 8px 18px;
			color: #8b949e;
			text-decoration: none;
			font-size: 13px;
			border-bottom: 2px solid transparent;
		}
		#nav a:hover { color: #eee; background: #161b22; }
		#nav a.active { color: #eee; border-bottom-color: #4a6aae; }
		#main { display: flex; flex: 1; }
		#sidebar {
			width: 220px; min-width: 220px; padding: 14px 12px;
			background: #1a1a2e; font-size: 13px; color: #aaa; overflow-y: auto;
		}
		#sidebar .ctrl-group { margin-bottom: 14px; }
		#sidebar .ctrl-group-title {
			font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
			color: #667; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #333;
		}
		#sidebar .ctrl-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
		#sidebar .ctrl-row label { white-space: nowrap; min-width: 50px; }
		#sidebar input[type="text"] {
			width: 100%; padding: 4px 8px; border: 1px solid #444;
			background: #2a2a4e; color: #eee; border-radius: 4px; font-size: 13px;
		}
		#sidebar input[type="number"] {
			width: 56px; padding: 4px 6px; border: 1px solid #444;
			background: #2a2a4e; color: #eee; border-radius: 4px; font-size: 13px; text-align: center;
		}
		#sidebar input[type="color"] { width: 28px; height: 24px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; }
		#sidebar input[type="range"] { width: 80px; accent-color: #4a6aae; cursor: pointer; }
		#sidebar input[type="checkbox"] { accent-color: #4a6aae; cursor: pointer; }
		#sidebar .slider-val {
			width: 46px; padding: 2px 4px; border: 1px solid #444; background: #2a2a4e;
			color: #eee; border-radius: 4px; font-size: 12px; text-align: center;
			appearance: textfield; -moz-appearance: textfield;
		}
		#sidebar .slider-val::-webkit-inner-spin-button,
		#sidebar .slider-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
		#sidebar select {
			padding: 3px 6px; border: 1px solid #444; background: #2a2a4e;
			color: #eee; border-radius: 4px; font-size: 13px; cursor: pointer;
		}
		#app { flex: 1; overflow: hidden; }
		#app canvas { display: block; }
	</style>
</head>
<body>
	<nav id="nav">
		<a href="../v8/">V8</a>
		<a href="../v7/">V7</a>
		<a href="../v6/" class="active">V6</a>
		<a href="../comparison/">Live Rendering Comparison</a>
		<a href="../benchmark/">Benchmark</a>
	</nav>
	<h1>pixi-slug — PixiJS v6</h1>

	<div id="main">
		<div id="sidebar">
			<div class="ctrl-group">
				<div class="ctrl-group-title">Text</div>
				<div class="ctrl-row"><input type="text" id="ctrlText" value="The quick brown fox"></div>
				<div class="ctrl-row">
					<label for="ctrlFontSize">Size</label>
					<input type="range" id="ctrlFontSize" value="120" min="4" max="400" step="1">
					<input type="number" id="ctrlFontSizeVal" class="slider-val" value="120">
				</div>
				<div class="ctrl-row">
					<label for="ctrlFillColor">Fill</label>
					<input type="color" id="ctrlFillColor" value="#ffffff">
				</div>
			</div>
			<div class="ctrl-group">
				<div class="ctrl-group-title"><input type="checkbox" id="ctrlStroke"><label for="ctrlStroke">Stroke</label></div>
				<div class="ctrl-row">
					<label for="ctrlStrokeWidth">Width</label>
					<input type="range" id="ctrlStrokeWidth" value="2" min="0" max="20" step="1">
					<input type="number" id="ctrlStrokeWidthVal" class="slider-val" value="2">
				</div>
				<div class="ctrl-row"><label for="ctrlStrokeColor">Color</label><input type="color" id="ctrlStrokeColor" value="#000000"></div>
				<div class="ctrl-row">
					<label for="ctrlStrokeAlphaMode">Alpha</label>
					<select id="ctrlStrokeAlphaMode"><option value="uniform" selected>Uniform</option><option value="gradient">Gradient</option></select>
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeAlphaStart">Start</label>
					<input type="range" id="ctrlStrokeAlphaStart" value="1" min="0" max="1" step="0.05">
					<input type="number" id="ctrlStrokeAlphaStartVal" class="slider-val" value="1" step="0.05">
				</div>
				<div class="ctrl-row">
					<label for="ctrlStrokeAlphaRate">Rate</label>
					<input type="range" id="ctrlStrokeAlphaRate" value="0" min="-0.5" max="0.5" step="0.01">
					<input type="number" id="ctrlStrokeAlphaRateVal" class="slider-val" value="0" step="0.01">
				</div>
			</div>
			<div class="ctrl-group">
				<div class="ctrl-group-title"><input type="checkbox" id="ctrlShadow"><label for="ctrlShadow">Shadow</label></div>
				<div class="ctrl-row">
					<label for="ctrlShadowDist">Dist</label>
					<input type="range" id="ctrlShadowDist" value="5" min="0" max="30" step="1">
					<input type="number" id="ctrlShadowDistVal" class="slider-val" value="5">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowAngle">Angle</label>
					<input type="range" id="ctrlShadowAngle" min="0" max="360" step="1" value="30">
					<input type="number" id="ctrlShadowAngleVal" class="slider-val" value="30">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowAlpha">Alpha</label>
					<input type="range" id="ctrlShadowAlpha" min="0" max="1" step="0.05" value="1">
					<input type="number" id="ctrlShadowAlphaVal" class="slider-val" value="1" step="0.05">
				</div>
				<div class="ctrl-row">
					<label for="ctrlShadowBlur">Blur</label>
					<input type="range" id="ctrlShadowBlur" min="0" max="20" step="1" value="0">
					<input type="number" id="ctrlShadowBlurVal" class="slider-val" value="0">
				</div>
				<div class="ctrl-row"><label for="ctrlShadowColor">Color</label><input type="color" id="ctrlShadowColor" value="#000000"></div>
			</div>
		</div>
		<div id="app"></div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/pixi.js@6/dist/browser/pixi.min.js"></script>
	<script src="../dist/v6/index.js"></script>

	<script>
		(async function () {
			var appContainer = document.getElementById('app');
			var app = new PIXI.Application({
				resizeTo: appContainer,
				backgroundColor: 0x16213e,
				preferWebGLVersion: 2
			});
			appContainer.appendChild(app.view);

			var fontResponse = await fetch('font.ttf');
			if (!fontResponse.ok) {
				var info = new PIXI.Text('Place a font.ttf file in examples/v6/ to see Slug rendering.', { fill: '#ffffff', fontSize: 18 });
				info.x = 40; info.y = 180;
				app.stage.addChild(info);
				return;
			}

			var fontData = await fontResponse.arrayBuffer();
			var font = new pixiSlug.SlugFont(4096);
			await font.load(fontData);

			var slugText = new pixiSlug.SlugText({
				text: document.getElementById('ctrlText').value,
				slugFont: font,
				options: {
					fontSize: parseInt(document.getElementById('ctrlFontSize').value, 10) || 120,
					fill: hexToRGBA(document.getElementById('ctrlFillColor').value)
				}
			});
			slugText.position.set(10, 10);
			app.stage.addChild(slugText);

			function hexToRGBA(hex) {
				var r = parseInt(hex.slice(1, 3), 16) / 255;
				var g = parseInt(hex.slice(3, 5), 16) / 255;
				var b = parseInt(hex.slice(5, 7), 16) / 255;
				return [r, g, b, 1];
			}
			function applyStroke() {
				var enabled = document.getElementById('ctrlStroke').checked;
				if (!enabled) { slugText.strokeWidth = 0; return; }
				slugText.stroke = {
					width: parseFloat(document.getElementById('ctrlStrokeWidth').value) || 0,
					color: hexToRGBA(document.getElementById('ctrlStrokeColor').value),
					alphaMode: document.getElementById('ctrlStrokeAlphaMode').value,
					alphaStart: parseFloat(document.getElementById('ctrlStrokeAlphaStart').value),
					alphaRate: parseFloat(document.getElementById('ctrlStrokeAlphaRate').value)
				};
			}
			function applyShadow() {
				var enabled = document.getElementById('ctrlShadow').checked;
				if (!enabled) { slugText.dropShadow = null; return; }
				slugText.dropShadow = {
					distance: parseFloat(document.getElementById('ctrlShadowDist').value) || 5,
					angle: (parseFloat(document.getElementById('ctrlShadowAngle').value) || 30) * Math.PI / 180,
					color: hexToRGBA(document.getElementById('ctrlShadowColor').value),
					alpha: parseFloat(document.getElementById('ctrlShadowAlpha').value),
					blur: parseFloat(document.getElementById('ctrlShadowBlur').value) || 0
				};
			}
			function linkSlider(sliderId, inputId, onChange) {
				var slider = document.getElementById(sliderId);
				var input = document.getElementById(inputId);
				var min = parseFloat(slider.min), max = parseFloat(slider.max), step = parseFloat(slider.step) || 1;
				function sync(src) {
					var v = parseFloat(src.value);
					if (isNaN(v)) return;
					v = Math.min(Math.max(v, min), max);
					v = parseFloat((Math.round(v / step) * step).toFixed(10));
					slider.value = v; input.value = v;
					if (onChange) onChange(v);
				}
				slider.oninput = function () { sync(slider); };
				input.onchange = function () { sync(input); };
			}

			document.getElementById('ctrlText').oninput = function () { slugText.text = this.value; };
			linkSlider('ctrlFontSize', 'ctrlFontSizeVal', function (v) { slugText.fontSize = v; });
			var _t = null;
			function debStroke() { clearTimeout(_t); _t = setTimeout(applyStroke, 30); }
			function debShadow() { clearTimeout(_t); _t = setTimeout(applyShadow, 30); }
			document.getElementById('ctrlFillColor').oninput = function () { slugText.color = hexToRGBA(this.value); };
			document.getElementById('ctrlStroke').onchange = applyStroke;
			linkSlider('ctrlStrokeWidth', 'ctrlStrokeWidthVal', applyStroke);
			document.getElementById('ctrlStrokeColor').oninput = debStroke;
			document.getElementById('ctrlStrokeAlphaMode').onchange = applyStroke;
			linkSlider('ctrlStrokeAlphaStart', 'ctrlStrokeAlphaStartVal', applyStroke);
			linkSlider('ctrlStrokeAlphaRate', 'ctrlStrokeAlphaRateVal', applyStroke);
			document.getElementById('ctrlShadow').onchange = applyShadow;
			linkSlider('ctrlShadowDist', 'ctrlShadowDistVal', applyShadow);
			linkSlider('ctrlShadowAngle', 'ctrlShadowAngleVal', debShadow);
			linkSlider('ctrlShadowAlpha', 'ctrlShadowAlphaVal', applyShadow);
			linkSlider('ctrlShadowBlur', 'ctrlShadowBlurVal', applyShadow);
			document.getElementById('ctrlShadowColor').oninput = debShadow;
		})();
	</script>
</body>
</html>
