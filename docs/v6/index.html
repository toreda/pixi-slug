<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pixi-slug — PixiJS v6 Example</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body {
			background: #0a0a1a;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color: #eee;
			display: flex;
			flex-direction: column;
			align-items: center;
			min-height: 100vh;
		}
		h1 { text-align: center; padding: 12px; font-size: 1.2rem; background: #16213e; width: 100%; }
		canvas { border: 1px solid #333; }
		#nav { display: flex; gap: 0; background: #0d1117; width: 100%; }
		#nav a { padding: 8px 18px; color: #8b949e; text-decoration: none; font-size: 13px; border-bottom: 2px solid transparent; }
		#nav a:hover { color: #eee; background: #161b22; }
		#nav a.active { color: #eee; border-bottom-color: #4a6aae; }
		#controls {
			width: 800px; padding: 10px 12px; background: #1a1a2e;
			display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: center;
			font-size: 13px; color: #aaa;
		}
		#controls label { white-space: nowrap; }
		#controls input[type="text"] { width: 320px; padding: 4px 8px; border: 1px solid #444; background: #2a2a4e; color: #eee; border-radius: 4px; font-size: 13px; }
		#controls input[type="number"] { width: 56px; padding: 4px 6px; border: 1px solid #444; background: #2a2a4e; color: #eee; border-radius: 4px; font-size: 13px; text-align: center; }
		#controls input[type="color"] { width: 28px; height: 24px; border: 1px solid #444; background: none; cursor: pointer; padding: 0; }
		#controls input[type="range"] { width: 80px; accent-color: #4a6aae; cursor: pointer; }
		#controls input[type="checkbox"] { accent-color: #4a6aae; cursor: pointer; }
		.ctrl-sep { width: 1px; height: 20px; background: #333; }
	</style>
</head>
<body>
	<nav id="nav">
		<a href="/examples/v8/">V8</a>
		<a href="/examples/v7/">V7</a>
		<a href="/examples/v6/" class="active">V6</a>
		<a href="/examples/comparison/">Live Rendering Comparison</a>
		<a href="/examples/benchmark/">Benchmark</a>
	</nav>
	<h1>pixi-slug — PixiJS v6</h1>

	<div id="controls">
		<label for="ctrlText">Text:</label>
		<input type="text" id="ctrlText" value="The quick brown fox">
		<label for="ctrlFontSize">Size:</label>
		<input type="number" id="ctrlFontSize" value="48" min="4" max="400" step="1">
		<div class="ctrl-sep"></div>
		<input type="checkbox" id="ctrlStroke"><label for="ctrlStroke">Stroke</label>
		<label for="ctrlStrokeWidth">W:</label>
		<input type="number" id="ctrlStrokeWidth" value="2" min="0" max="20" step="0.5">
		<input type="color" id="ctrlStrokeColor" value="#000000">
		<div class="ctrl-sep"></div>
		<input type="checkbox" id="ctrlShadow"><label for="ctrlShadow">Shadow</label>
		<label for="ctrlShadowDist">Dist:</label>
		<input type="number" id="ctrlShadowDist" value="5" min="0" max="30" step="1">
		<label for="ctrlShadowAngle">Angle:</label>
		<input type="range" id="ctrlShadowAngle" min="0" max="360" step="1" value="30">
		<span id="ctrlShadowAngleVal">30°</span>
		<input type="color" id="ctrlShadowColor" value="#000000">
	</div>

	<div id="app"></div>

	<script src="https://cdn.jsdelivr.net/npm/pixi.js@6/dist/browser/pixi.min.js"></script>
	<script src="../../dist/v6/index.js"></script>

	<script>
		(async function () {
			var app = new PIXI.Application({
				width: 800,
				height: 450,
				backgroundColor: 0x16213e,
				preferWebGLVersion: 2
			});
			document.getElementById('app').appendChild(app.view);

			var fontResponse = await fetch('font.ttf');
			if (!fontResponse.ok) {
				var info = new PIXI.Text('Place a font.ttf file in examples/v6/ to see Slug rendering.', { fill: '#ffffff', fontSize: 18 });
				info.x = 40; info.y = 180;
				app.stage.addChild(info);
				return;
			}

			var fontData = await fontResponse.arrayBuffer();
			var font = new pixiSlug.SlugFont(4096);
			await font.load(fontData);

			var slugText = new pixiSlug.SlugText({
				text: document.getElementById('ctrlText').value,
				slugFont: font,
				options: { fontSize: parseInt(document.getElementById('ctrlFontSize').value, 10) || 48 }
			});
			slugText.position.set(10, 10);
			app.stage.addChild(slugText);

			function hexToRGBA(hex) {
				return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255, 1];
			}
			function applyStroke() {
				if (!document.getElementById('ctrlStroke').checked) { slugText.strokeWidth = 0; return; }
				slugText.stroke = { width: parseFloat(document.getElementById('ctrlStrokeWidth').value)||0, color: hexToRGBA(document.getElementById('ctrlStrokeColor').value) };
			}
			function applyShadow() {
				if (!document.getElementById('ctrlShadow').checked) { slugText.dropShadow = null; return; }
				slugText.dropShadow = {
					distance: parseFloat(document.getElementById('ctrlShadowDist').value)||5,
					angle: (parseFloat(document.getElementById('ctrlShadowAngle').value)||30) * Math.PI/180,
					color: hexToRGBA(document.getElementById('ctrlShadowColor').value), alpha: 1
				};
			}

			document.getElementById('ctrlText').oninput = function() { slugText.text = this.value; };
			document.getElementById('ctrlFontSize').oninput = function() { var s = parseInt(this.value,10); if(s>0) slugText.fontSize = s; };
			document.getElementById('ctrlStroke').onchange = applyStroke;
			document.getElementById('ctrlStrokeWidth').oninput = applyStroke;
			document.getElementById('ctrlStrokeColor').oninput = applyStroke;
			document.getElementById('ctrlShadow').onchange = applyShadow;
			document.getElementById('ctrlShadowDist').oninput = applyShadow;
			document.getElementById('ctrlShadowAngle').oninput = function() { document.getElementById('ctrlShadowAngleVal').textContent = this.value+'°'; applyShadow(); };
			document.getElementById('ctrlShadowColor').oninput = applyShadow;
		})();
	</script>
</body>
</html>
