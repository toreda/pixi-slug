<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>pixi-slug — PixiJS v8 Example</title>
	<link rel="stylesheet" href="../_shared/sidebar.css">
</head>
<body>
	<nav id="nav">
		<a href="../v8/" class="active">V8</a>
		<a href="../v7/">V7</a>
		<a href="../v6/">V6</a>
		<a href="../comparison/">Live Rendering Comparison</a>
		<a href="../benchmark/">Benchmark</a>
	</nav>
	<h1>pixi-slug — PixiJS v8</h1>

	<div id="main">
		<div id="sidebar"></div>
		<div id="app"></div>
	</div>

	<!-- PixiJS v8 via CDN -->
	<script src="https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.js"></script>

	<!-- pixi-slug v8 bundle (build with: pnpm run build:v8) -->
	<script src="../dist/v8/index.js"></script>

	<!-- Shared sidebar wiring -->
	<script src="../_shared/wire.js"></script>

	<script>
		(async function () {
			var appContainer = document.getElementById('app');

			// Create the canvas and WebGL2 context ourselves so we can
			// start the Slug shader prewarm BEFORE PIXI's renderer setup.
			// This is the maximum-parallelism prewarm path: the 500ms
			// shader link runs concurrently with PIXI's autoDetectRenderer,
			// stage construction, plugin chain, and any host-side work.
			var canvas = document.createElement('canvas');
			var gl = canvas.getContext('webgl2', {
				antialias: true,
				powerPreference: 'high-performance',
				premultipliedAlpha: true,
				preserveDrawingBuffer: false
			});

			// MUST be the first SlugFonts.* call — opts the global registry
			// into prewarm mode and kicks off the off-thread compile.
			// Fire-and-forget; the renderer-prewarm later will await this
			// implicitly via the adoption WeakMap.
			pixiSlug.SlugFonts.prewarmContext(gl);

			// Register the v8 plugin BEFORE app.init so PIXI invokes it
			// during initialization. The plugin's init hook calls
			// SlugFonts.attachRenderer(app.renderer), which finds the
			// already-prewarmed gl on renderer.gl and adopts the linked
			// program into PIXI's per-renderer cache — no recompile.
			//
			// The v8 entry point auto-attaches Ticker.shared at module
			// load. Detach it first so the plugin's app.ticker attach
			// does not trigger the registry's reattach policy.
			pixiSlug.SlugFonts.detachTicker();
			PIXI.extensions.add(pixiSlug.SlugApplicationPluginV8);

			// Build the PIXI Application around our pre-created context.
			// PIXI v8 accepts `context` in ApplicationOptions and uses our
			// gl instead of creating its own.
			var app = new PIXI.Application();
			await app.init({
				context: gl,
				canvas: canvas,
				resizeTo: appContainer,
				backgroundColor: 0x16213e,
				preferWebGLVersion: 2,
				antialias: true,
				resolution: 1
			});
			window.__PIXI_APP__ = app;

			appContainer.appendChild(app.canvas);

			window.SlugExample.run({
				construct: function (cfg) {
					var slugText = new pixiSlug.SlugText({
						text: cfg.text,
						font: cfg.font,
						fallbackWhileLoading: false,
						options: cfg.options,
						errorPolicy: {unknownInput: 'throw', loadFailed: 'throw', unsupportedFormat: 'throw'}
					});
					slugText.position.set(10, 10);
					return slugText;
				},
				addToStage: function (slugText) { app.stage.addChild(slugText); },
				removeFromStage: function (slugText) { app.stage.removeChild(slugText); },
				loadTexture: function (url) { return PIXI.Assets.load(url); }
			});
		})();
	</script>
</body>
</html>
